services:
  - type: web
    name: bandevigourmet
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    domains: []
  - type: web
    name: bandevigourmet-web
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    domains:
      - bandevigourmet.com
      - www.bandevigourmet.com
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_TOKEN_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: bandevigourmet-db
          property: connectionString
databases:
  - name: bandevigourmet-db
    plan: basic-256mb
    databaseName: bandevigourmet
    user: bandevigourmet
    region: oregon
