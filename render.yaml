services:
  - type: web
    name: bandevigourmet
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    domains: []
  - type: web
    name: bandevigourmet-web
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    domains:
      - bandevigourmet.com
      - www.bandevigourmet.com
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: ADMIN_PASSWORD
        sync: false
      - key: SALES_NOTIFICATION_EMAIL
        value: sales@bandeviglobalgroup.com
      - key: NOTIFICATION_FROM_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: ADMIN_TOKEN_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: bandevigourmet-db
          property: connectionString
databases:
  - name: bandevigourmet-db
    plan: basic-256mb
    databaseName: bandevigourmet
    user: bandevigourmet
    region: oregon
