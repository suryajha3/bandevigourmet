services:
  - type: web
    name: bandevigourmet-web
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    domains:
      - bandevigourmet.com
      - www.bandevigourmet.com
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_TOKEN_SECRET
        generateValue: true
